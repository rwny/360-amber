<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <link rel="icon" type="image/svg+xml" href="./vite.svg">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+Thai+Looped:wght@400;500;700&display=swap"
      rel="stylesheet">
   <title>360° Hotspot Viewer</title>
   <link rel="stylesheet" href="/src/style.css">
</head>

<body>
   <div id="pano-container"></div>

   <button id="ui-toggle-btn" class="glass-panel control-btn" title="Toggle UI">UI</button>

   <div id="controls" class="glass-panel">
      <button class="control-btn" id="zoom-in">Zoom In</button>
      <button class="control-btn" id="zoom-out">Zoom Out</button>
      <button class="control-btn" id="reset-view">Reset View</button>
   </div>

   <div id="image-selector" class="glass-panel">
      <label for="image-select">Select Image:</label>
      <select id="image-select">
         <!-- Options will be populated by JavaScript -->
      </select>
      <div id="photo-date">รูปถ่าย 16 มค. 2569</div>
   </div>

   <script src="/lib/marzipano.min.js"></script>
   <script type="module" src="/src/main.js"></script>


</body>

</html>
