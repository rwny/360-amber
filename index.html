<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <link rel="icon" type="image/svg+xml" href="./vite.svg">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+Thai+Looped:wght@400;500;700&display=swap"
      rel="stylesheet">
   <title>360° Hotspot Viewer</title>
   <link rel="stylesheet" href="/src/style.css">
</head>

<body>
   <div id="pano-container"></div>

   <button id="ui-toggle-btn" class="glass-panel control-btn" title="Toggle UI">UI</button>

   <div id="map-container" class="glass-panel">
      <div id="map-header">
         <div id="map-title">Mini Map</div>
         <div id="photo-date">16 มค. 69</div>
      </div>
      <div id="map-wrapper">
         <img id="map-image" src="/keyplan.png" alt="Map"
            onerror="this.style.display='none'; this.parentElement.classList.add('map-fallback');">
         <div id="map-markers"></div>
      </div>
      <div id="map-controls">
         <button class="control-btn" id="zoom-in" title="Zoom In">+</button>
         <button class="control-btn" id="zoom-out" title="Zoom Out">-</button>
         <button class="control-btn" id="reset-view" title="Reset View">Reset</button>
      </div>
   </div>

   <script src="/lib/marzipano.min.js"></script>
   <script type="module" src="/src/main.js"></script>

</body>

</html>
